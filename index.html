<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CAPD</title>
    <script>
      // iOS 가로 모드 viewport 버그 수정
      // device-width가 세로 폭으로 고정되어 양쪽에 여백이 생기는 현상 해결
      (function () {
        function fixViewport() {
          var isLandscape = Math.abs(window.orientation) === 90;
          var portraitW = Math.min(screen.width, screen.height);
          var landscapeW = Math.max(screen.width, screen.height);
          var meta = document.querySelector('meta[name=viewport]');
          if (!meta) return;
          if (isLandscape && window.innerWidth <= portraitW + 20) {
            meta.setAttribute('content',
              'width=' + landscapeW + ', initial-scale=1.0, viewport-fit=cover');
          } else if (!isLandscape) {
            meta.setAttribute('content',
              'width=device-width, initial-scale=1.0, viewport-fit=cover');
          }
        }
        fixViewport();
        window.addEventListener('orientationchange', function () {
          setTimeout(fixViewport, 150);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
